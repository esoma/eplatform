
name: release

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:

    defaults:
      run:
        shell: bash

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64]

    steps:
    - uses: actions/checkout@v2

    - name: Initialize Submodules
      run: |
        git submodule update --init --recursive

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install xvfb libglu1-mesa-dev freeglut3-dev mesa-common-dev
        sudo apt-get install build-essential git make pkg-config cmake ninja-build
        sudo apt-get install gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev
        sudo apt-get install libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev
        sudo apt-get install  libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev
        sudo apt-get install  libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev
        sudo apt-get install  libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev
        sudo apt-get install  libudev-dev libthai-dev

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        vulkan_version: 1.4.335.0
        install_runtime: true
        cache: true
        stripdown: true
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Build Wheels
      uses: pypa/cibuildwheel@v3.3.0
      env:
        CIBW_ARCHS: ${{ matrix.ciwb-arch }}

    - name: Upload Github Wheel Release Artifact
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./wheelhouse/*.whl
        file_glob: true
        tag: ${{ github.ref }}

    - name: Upload Wheels to PyPi
      if: github.event_name == 'release'
      run: |
        pipx run twine upload wheelhouse/* --skip-existing
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

    - name: Build Source
      if: runner.os == 'Linux'
      run: |
        pipx install build
        pipx run build --sdist

    - name: Upload Github Wheel Source Artifact
      if: runner.os == 'Linux' && github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./dist/*.tar.gz
        file_glob: true
        tag: ${{ github.ref }}

    - name: Upload Source to PyPi
      if: runner.os == 'Linux' && github.event_name == 'release'
      run: |
        pipx run twine upload dist/* --skip-existing
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
