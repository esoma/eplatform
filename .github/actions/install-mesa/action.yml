name: 'Install Mesa'
description: 'Install Mesa'
inputs:
  version:
    description: 'Version of Mesa to install'
    required: false
    default: '25.3.3'
runs:
  using: 'composite'
  steps:
    - name: Install Mesa Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install mesa-utils mesa-utils-extra
        sudo apt-get install libgl1-mesa-dri libglx-mesa0
        sudo apt-get install mesa-vulkan-drivers vulkan-tools

    - name: Install Mesa MacOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install mesa@${{ inputs.version }}

    - name: Install Mesa Windows
      if: runner.os == 'Windows'
      uses: ssciwr/setup-mesa-dist-win@v2
      with:
        version: ${{ inputs.version }}
