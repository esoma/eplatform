name: 'Install Vulkan SDK'
description: 'Install and cache the Vulkan SDK'
inputs:
  version:
    description: 'Vulkan SDK version to install'
    required: false
    default: '1.4.335.0'
outputs:
  path:
    description: 'Path to the Vulkan SDK directory'
    value: ${{ steps.set-output.outputs.path }}
runs:
  using: 'composite'
  steps:
    - name: restore vulkan sdk cache
      id: vulkan-sdk-cache
      uses: actions/cache/restore@v4
      with:
        path: vulkan-sdk
        key: ${{ runner.os }}-vulkan-sdk-${{ inputs.version }}

    - name: install vulkan sdk
      if: steps.vulkan-sdk-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python "$GITHUB_ACTION_PATH/install-vulkan-sdk.py" ${{ inputs.version }}

    - name: save vulkan sdk cache
      if: steps.vulkan-sdk-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: vulkan-sdk
        key: ${{ runner.os }}-vulkan-sdk-${{ inputs.version }}

    - name: set vulkan sdk env vars
      id: set-output
      shell: bash
      run: |
        VULKAN_SDK_PATH="${PWD}/vulkan-sdk"
        echo "VK_LAYER_PATH=${VULKAN_SDK_PATH}/bin" >> $GITHUB_ENV
        echo "VULKAN_SDK=${VULKAN_SDK_PATH}" >> $GITHUB_ENV
        echo "path=${VULKAN_SDK_PATH}" >> $GITHUB_OUTPUT
