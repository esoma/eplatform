name: 'Install Vulkan SDK'
description: 'Install and cache the Vulkan SDK'
inputs:
  version:
    description: 'Vulkan SDK version to install'
    required: false
    default: '1.4.335.0'
outputs:
  path:
    description: 'Path to the Vulkan SDK directory'
    value: ${{ steps.setup.outputs.path }}
runs:
  using: 'composite'
  steps:
    - name: restore vulkan sdk cache
      id: vulkan-sdk-cache
      uses: actions/cache/restore@v4
      with:
        path: vulkan-sdk
        key: ${{ runner.os }}-vulkan-sdk-${{ inputs.version }}

    - name: install vulkan sdk
      if: steps.vulkan-sdk-cache.outputs.cache-hit != 'true'
      shell: python
      run: |
        from subprocess import run
        import os
        import sys
        from pathlib import Path
        run([
          sys.executable,
          Path(os.environ["GITHUB_ACTION_PATH"]) / "install-vulkan-sdk.py",
          "${{ inputs.version }}"
        ], check=True)

    - name: save vulkan sdk cache
      if: steps.vulkan-sdk-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: vulkan-sdk
        key: ${{ runner.os }}-vulkan-sdk-${{ inputs.version }}

    - name: setup vulkan sdk
      id: setup
      run: |
        from subprocess import run
        import os
        import sys
        from pathlib import Path
        run([
          sys.executable,
          Path(os.environ["GITHUB_ACTION_PATH"]) / "setup-vulkan-sdk.py",
          "${{ inputs.version }}"
        ], check=True)
